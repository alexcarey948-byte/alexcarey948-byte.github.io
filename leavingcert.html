<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaving Cert — Past Papers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f13;
    --surface: #16181f;
    --card: #1c1f2a;
    --border: #2a2d3a;
    --accent: #e8c84a;
    --accent2: #5b8dee;
    --text: #e8e9f0;
    --muted: #7a7d8f;
    --higher: #5b8dee;
    --ordinary: #e87a5b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  header {
    padding: 3rem 2rem 1.5rem;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
  }

  /* Level filter */
  .level-filter {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin: 2rem auto 0;
    position: relative;
    z-index: 1;
  }

  .level-btn {
    padding: 0.45rem 1.2rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .level-btn:hover { border-color: var(--accent); color: var(--text); }
  .level-btn.active-all { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
  .level-btn.active-higher { background: var(--higher); border-color: var(--higher); color: #fff; font-weight: 500; }
  .level-btn.active-ordinary { background: var(--ordinary); border-color: var(--ordinary); color: #fff; font-weight: 500; }

  /* Subject grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    max-width: 1100px;
    margin: 2.5rem auto;
    padding: 0 1.5rem;
    position: relative;
    z-index: 1;
  }

  .subject-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem 1.5rem;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .subject-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .subject-card:hover { transform: translateY(-3px); border-color: #3a3d4a; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .subject-card:hover::before { transform: scaleX(1); }
  .subject-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 8px 32px rgba(232,200,74,0.12); }
  .subject-card.active::before { transform: scaleX(1); }

  .card-icon {
    font-size: 1.6rem;
    margin-bottom: 0.75rem;
    display: block;
  }

  .card-subject {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.3rem;
  }

  .card-topic {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .card-meta {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 0.7rem;
    padding: 0.2rem 0.55rem;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .badge-higher { background: rgba(91,141,238,0.15); color: var(--higher); border: 1px solid rgba(91,141,238,0.3); }
  .badge-ordinary { background: rgba(232,122,91,0.15); color: var(--ordinary); border: 1px solid rgba(232,122,91,0.3); }
  .badge-year { background: rgba(232,200,74,0.1); color: var(--accent); border: 1px solid rgba(232,200,74,0.2); }

  /* Modal / Question Panel */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    animation: fadeIn 0.2s ease;
  }

  .overlay.open { display: flex; align-items: center; justify-content: center; padding: 1rem; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 780px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
  }

  .panel-header {
    padding: 2rem 2rem 1.25rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
  }

  .panel-title-group { flex: 1; }

  .panel-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 700;
  }

  .close-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    margin-top: 0.25rem;
  }
  .close-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Topic tabs */
  .topic-tabs {
    display: flex;
    gap: 0.5rem;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .topic-tabs::-webkit-scrollbar { display: none; }

  .topic-tab {
    padding: 0.4rem 1rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .topic-tab:hover { color: var(--text); border-color: #444; }
  .topic-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

  /* Questions list */
  .questions-body { padding: 1.5rem 2rem 2rem; }

  .level-section { margin-bottom: 2rem; }

  .level-heading {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .level-heading.higher { color: var(--higher); }
  .level-heading.ordinary { color: var(--ordinary); }
  .level-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .question-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .question-item:hover { border-color: #3a3d4a; }

  .question-year-tag {
    font-size: 0.68rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
    text-transform: uppercase;
  }

  .question-text {
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--text);
    font-weight: 300;
  }

  .question-marks {
    margin-top: 0.5rem;
    font-size: 0.72rem;
    color: var(--muted);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  scrollbar-width: thin;
  .panel::-webkit-scrollbar { width: 5px; }
  .panel::-webkit-scrollbar-track { background: transparent; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
</style>
</head>
<body>

<header>
  <p class="eyebrow">For Halal</p>

</div>

let currentSubject = null;
let currentTopic = null;
let currentLevel = 'all';

// Render subject cards
function renderGrid() {
  const grid = document.getElementById('subjectGrid');
  grid.innerHTML = '';
  subjects.forEach(s => {
    const allTopics = Object.keys(s.topics);
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.innerHTML = `
      <span class="card-icon">${s.icon}</span>
      <div class="card-subject">${s.subject}</div>
      <div class="card-topic">${allTopics.join(' · ')}</div>
      <div class="card-meta">
        <span class="badge badge-higher">Higher</span>
        <span class="badge badge-ordinary">Ordinary</span>
      </div>
    `;
    card.addEventListener('click', () => openPanel(s));
    grid.appendChild(card);
  });
}

function openPanel(subject) {
  currentSubject = subject;
  const topics = Object.keys(subject.topics);
  currentTopic = topics[0];

  document.getElementById('panelEyebrow').textContent = subject.subject;
  document.getElementById('panelTitle').textContent = subject.subject + ' — Past Papers';

  renderTopicTabs(topics);
  renderQuestions();

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderTopicTabs(topics) {
  const container = document.getElementById('topicTabs');
  container.innerHTML = '';
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-tab' + (t === currentTopic ? ' active' : '');
    btn.textContent = t;
    btn.addEventListener('click', () => {
      currentTopic = t;
      renderTopicTabs(topics);
      renderQuestions();
    });
    container.appendChild(btn);
  });
}

function renderQuestions() {
  const body = document.getElementById('questionsBody');
  body.innerHTML = '';
  const topicData = currentSubject.topics[currentTopic];

  const levels = currentLevel === 'all' ? ['Higher', 'Ordinary'] : [currentLevel];

  let hasAny = false;
  levels.forEach(level => {
    const qs = topicData[level];
    if (!qs || qs.length === 0) return;
    hasAny = true;

    const section = document.createElement('div');
    section.className = 'level-section';
    const heading = document.createElement('div');
    heading.className = `level-heading ${level.toLowerCase()}`;
    heading.textContent = level + ' Level';
    section.appendChild(heading);

    qs.forEach(q => {
      const item = document.createElement('div');
      item.className = 'question-item';
      item.innerHTML = `
        <div class="question-year-tag">📅 ${q.year} Exam</div>
        <div class="question-text">${q.text}</div>
        <div class="question-marks">${q.marks}</div>
      `;
      section.appendChild(item);
    });
    body.appendChild(section);
  });

  if (!hasAny) {
    body.innerHTML = '<div class="empty-state">No questions available for this selection.</div>';
  }
}

// Level filter
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLevel = btn.dataset.filter;
    document.querySelectorAll('.level-btn').forEach(b => {
      b.className = 'level-btn';
    });
    if (currentLevel === 'all') btn.classList.add('active-all');
    else if (currentLevel === 'Higher') btn.classList.add('active-higher');
    else btn.classList.add('active-ordinary');

    if (currentSubject) renderQuestions();
  });
});

// Close
document.getElementById('closeBtn').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closePanel();
});

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

renderGrid();
</script>
